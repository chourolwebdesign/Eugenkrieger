<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Dachboden nachher – besenrein">
  <defs>
    <linearGradient id="dn-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe9dd"/><stop offset="1" stop-color="#ddd5c4"/>
    </linearGradient>
    <linearGradient id="dn-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cdae80"/><stop offset="1" stop-color="#b3915f"/>
    </linearGradient>
    <linearGradient id="dn-light" x1="0.55" y1="0" x2="0.45" y2="1">
      <stop offset="0" stop-color="#fff8e6" stop-opacity="0.92"/><stop offset="1" stop-color="#fff8e6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dn-vig" cx="0.5" cy="0.45" r="0.82">
      <stop offset="0.6" stop-color="#fff" stop-opacity="0"/><stop offset="1" stop-color="#8a7a5f" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="660" fill="url(#dn-wall)"/>
  <polygon points="0,0 1200,0 1200,90 600,30 0,360" fill="#dcd4c2"/>
  <polygon points="0,360 600,30 1200,90 1200,120 600,70 0,420" fill="#cbc2af"/>
  <polygon points="600,30 600,70 0,420 0,360" fill="#d3cab8"/>
  <g stroke="#e0d6c1" stroke-width="22" stroke-linecap="round">
    <line x1="600" y1="55" x2="130" y2="610"/><line x1="600" y1="55" x2="1070" y2="610"/>
  </g>
  <rect y="660" width="1200" height="240" fill="url(#dn-floor)"/>
  <polygon points="0,660 1200,660 1200,672 0,672" fill="#9c7c4e" opacity="0.5"/>
  <g stroke="#a8824f" stroke-width="2" opacity="0.4"><line x1="0" y1="760" x2="1200" y2="760"/><line x1="0" y1="840" x2="1200" y2="840"/><line x1="430" y1="660" x2="400" y2="900"/><line x1="800" y1="660" x2="800" y2="900"/></g>

  <!-- roof window with strong daylight -->
  <polygon points="760,150 980,185 980,310 760,265" fill="#d2e2e9" stroke="#bdb4a3" stroke-width="10"/>
  <line x1="870" y1="167" x2="870" y2="287" stroke="#bdb4a3" stroke-width="7"/>
  <polygon points="770,300 970,330 1120,660 540,680" fill="url(#dn-light)"/>
  <ellipse cx="700" cy="790" rx="520" ry="44" fill="#ffffff" opacity="0.13"/>

  <!-- broom (besenrein) -->
  <g>
    <line x1="300" y1="330" x2="240" y2="640" stroke="#F58220" stroke-width="15" stroke-linecap="round"/>
    <path d="M215 628l52-14 16 60c5 18-7 38-26 40l-42 4c-19 2-32-18-23-36z" fill="#F58220"/>
    <path d="M232 612l44-12" stroke="#b0570b" stroke-width="6" opacity="0.6"/>
    <ellipse cx="250" cy="652" rx="66" ry="14" fill="#7a5a2f" opacity="0.3"/>
  </g>
  <!-- a couple of tidy stacked boxes ready to go -->
  <g stroke="#7c5733" stroke-width="3" opacity="0.95">
    <rect x="940" y="560" width="120" height="100" fill="#c79355"/>
    <path d="M1000 560v100M948 610h104" stroke="#a07a45"/>
    <rect x="955" y="470" width="95" height="90" fill="#d3a566"/>
  </g>

  <rect width="1200" height="900" fill="url(#dn-vig)"/>
</svg>
