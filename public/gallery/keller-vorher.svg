<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Keller vorher – vollgestellt">
  <defs>
    <linearGradient id="kvWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b6253"/><stop offset="1" stop-color="#534b40"/>
    </linearGradient>
    <linearGradient id="kvFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f3a33"/><stop offset="1" stop-color="#2b2722"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#kvWall)"/>
  <rect y="600" width="1200" height="300" fill="url(#kvFloor)"/>
  <!-- pipes -->
  <rect x="0" y="70" width="1200" height="26" fill="#7d7464"/>
  <rect x="980" y="70" width="26" height="540" fill="#7d7464"/>
  <!-- small window -->
  <rect x="120" y="150" width="180" height="120" fill="#9aa7ad" stroke="#3a3630" stroke-width="10"/>
  <line x1="210" y1="150" x2="210" y2="270" stroke="#3a3630" stroke-width="8"/>
  <!-- clutter: stacked boxes -->
  <g stroke="#3a2f23" stroke-width="4">
    <rect x="150" y="470" width="160" height="140" fill="#b07a45"/>
    <rect x="150" y="350" width="150" height="120" fill="#c08a52"/>
    <path d="M150 470h160M225 470v140" stroke="#7c5733" stroke-width="4"/>
    <rect x="330" y="500" width="170" height="110" fill="#a9743f"/>
    <path d="M415 500v110M330 555h170" stroke="#7c5733"/>
  </g>
  <!-- old chair -->
  <g fill="#5d4b38" stroke="#3a2f23" stroke-width="4">
    <rect x="560" y="430" width="20" height="180"/>
    <rect x="700" y="430" width="20" height="180"/>
    <rect x="555" y="420" width="170" height="24"/>
    <rect x="555" y="300" width="24" height="130"/>
  </g>
  <!-- bags / clutter piles -->
  <path d="M770 610c10-90 60-120 120-120s100 40 110 120z" fill="#4b5a63" stroke="#2c363c" stroke-width="4"/>
  <ellipse cx="640" cy="620" rx="130" ry="26" fill="#241f1a" opacity="0.5"/>
  <!-- scattered items -->
  <circle cx="430" cy="640" r="26" fill="#7a8e58"/>
  <rect x="520" y="600" width="70" height="40" rx="6" fill="#8a5b4a"/>
  <!-- ladder -->
  <g stroke="#9a7b4a" stroke-width="10">
    <line x1="860" y1="280" x2="900" y2="610"/>
    <line x1="930" y1="280" x2="900" y2="610"/>
    <line x1="876" y1="360" x2="918" y2="360"/>
    <line x1="884" y1="450" x2="912" y2="450"/>
    <line x1="890" y1="540" x2="906" y2="540"/>
  </g>
  <rect width="1200" height="900" fill="#1a1712" opacity="0.18"/>
</svg>
