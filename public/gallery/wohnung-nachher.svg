<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Wohnzimmer nachher – besenrein">
  <defs>
    <linearGradient id="wn-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3eee4"/><stop offset="1" stop-color="#e3dccd"/>
    </linearGradient>
    <linearGradient id="wn-lwall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d8cfbe"/><stop offset="1" stop-color="#eae3d4"/>
    </linearGradient>
    <linearGradient id="wn-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d3b486"/><stop offset="1" stop-color="#bb9a6c"/>
    </linearGradient>
    <linearGradient id="wn-light" x1="0.7" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#fff8e8" stop-opacity="0.9"/><stop offset="1" stop-color="#fff8e8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="wn-vig" cx="0.5" cy="0.45" r="0.8">
      <stop offset="0.6" stop-color="#fff" stop-opacity="0"/><stop offset="1" stop-color="#8a7a5f" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="640" fill="url(#wn-wall)"/>
  <polygon points="0,0 150,90 150,690 0,900" fill="url(#wn-lwall)"/>
  <rect y="640" width="1200" height="260" fill="url(#wn-floor)"/>
  <polygon points="150,690 1200,640 1200,900 0,900" fill="url(#wn-floor)"/>
  <polygon points="150,690 1200,640 1200,650 150,700" fill="#9c7c4e" opacity="0.5"/>
  <!-- parquet seams in perspective -->
  <g stroke="#a8824f" stroke-width="2" opacity="0.45">
    <line x1="150" y1="745" x2="1200" y2="720"/><line x1="120" y1="805" x2="1200" y2="780"/><line x1="80" y1="865" x2="1200" y2="845"/>
    <line x1="430" y1="690" x2="380" y2="900"/><line x1="720" y1="675" x2="720" y2="900"/><line x1="1000" y1="660" x2="1060" y2="900"/>
  </g>

  <!-- window with bright daylight -->
  <rect x="820" y="120" width="300" height="250" rx="6" fill="#cfe2ea" stroke="#c4bba8" stroke-width="16"/>
  <line x1="970" y1="120" x2="970" y2="370" stroke="#c4bba8" stroke-width="11"/>
  <line x1="820" y1="245" x2="1120" y2="245" stroke="#c4bba8" stroke-width="11"/>
  <!-- light beam -->
  <polygon points="835,360 1110,360 1190,760 470,790" fill="url(#wn-light)"/>
  <ellipse cx="720" cy="800" rx="560" ry="52" fill="#ffffff" opacity="0.14"/>

  <!-- plant accent (left) -->
  <g>
    <path d="M150 620h120l-16 90h-88z" fill="#cf6a36"/>
    <path d="M210 620c-50-18-74-72-46-116 34 14 56 64 46 116z" fill="#4f7d4a"/>
    <path d="M210 620c52-12 84-58 66-108-38 8-66 56-66 108z" fill="#5e9156"/>
    <path d="M210 620c-8-66 12-110 0-156-34 32-28 110 0 156z" fill="#6fa566"/>
    <ellipse cx="210" cy="712" rx="120" ry="20" fill="#7a5a2f" opacity="0.35"/>
  </g>

  <!-- broom leaning on right wall (besenrein) -->
  <g>
    <line x1="1040" y1="380" x2="980" y2="700" stroke="#F58220" stroke-width="15" stroke-linecap="round"/>
    <path d="M955 688l52 14 -16 60c-5 18-28 26-43 15l-33-26c-15-12-11-37 7-46z" fill="#F58220"/>
    <path d="M947 712l46 14" stroke="#b0570b" stroke-width="6" opacity="0.6"/>
    <ellipse cx="975" cy="712" rx="70" ry="14" fill="#7a5a2f" opacity="0.3"/>
  </g>

  <rect width="1200" height="900" fill="url(#wn-vig)"/>
</svg>
