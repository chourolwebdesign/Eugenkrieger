<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Keller nachher – besenrein">
  <defs>
    <linearGradient id="knWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8d2c6"/><stop offset="1" stop-color="#c3bcad"/>
    </linearGradient>
    <linearGradient id="knFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a9183"/><stop offset="1" stop-color="#827a6d"/>
    </linearGradient>
    <linearGradient id="knLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7e8" stop-opacity="0.8"/><stop offset="1" stop-color="#fff7e8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#knWall)"/>
  <rect y="600" width="1200" height="300" fill="url(#knFloor)"/>
  <rect x="0" y="70" width="1200" height="22" fill="#cfc8ba"/>
  <!-- window with light -->
  <rect x="120" y="150" width="180" height="120" fill="#bcd2dd" stroke="#a59c8c" stroke-width="10"/>
  <line x1="210" y1="150" x2="210" y2="270" stroke="#a59c8c" stroke-width="8"/>
  <polygon points="130,260 290,260 470,600 -40,600" fill="url(#knLight)"/>
  <!-- clean floor sheen -->
  <ellipse cx="600" cy="760" rx="520" ry="60" fill="#ffffff" opacity="0.10"/>
  <!-- broom leaning (besenrein) -->
  <g>
    <line x1="900" y1="300" x2="980" y2="600" stroke="#F58220" stroke-width="14" stroke-linecap="round"/>
    <path d="M955 590l50 18-18 56c-6 18-30 26-44 14l-30-26c-14-12-10-36 8-44z" fill="#F58220"/>
    <path d="M946 612l44 16" stroke="#0B1E3B" stroke-width="6" opacity="0.5"/>
  </g>
  <!-- small plant accent -->
  <g>
    <rect x="250" y="560" width="50" height="46" rx="6" fill="#b9532a"/>
    <path d="M275 560c-30-10-46-44-30-70 22 8 34 40 30 70z" fill="#4f7d4a"/>
    <path d="M275 560c30-6 50-36 40-66-24 4-40 34-40 66z" fill="#5e9156"/>
  </g>
</svg>
