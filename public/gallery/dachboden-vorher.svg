<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Dachboden vorher – vollgestellt">
  <defs>
    <linearGradient id="dvWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6f6557"/><stop offset="1" stop-color="#564d41"/>
    </linearGradient>
    <linearGradient id="dvFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#564434"/><stop offset="1" stop-color="#3d3025"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#dvWall)"/>
  <!-- sloped roof -->
  <polygon points="0,0 1200,0 1200,120 600,40 0,360" fill="#4a4238"/>
  <polygon points="0,360 600,40 1200,120 1200,150 600,80 0,420" fill="#3a342c"/>
  <!-- beams -->
  <line x1="600" y1="60" x2="120" y2="620" stroke="#6b5d49" stroke-width="20"/>
  <line x1="600" y1="60" x2="1080" y2="620" stroke="#6b5d49" stroke-width="20"/>
  <rect y="620" width="1200" height="280" fill="url(#dvFloor)"/>
  <!-- roof window (Velux) -->
  <polygon points="780,150 980,180 980,300 780,260" fill="#94a3aa" stroke="#3a342c" stroke-width="10"/>
  <!-- old trunk + boxes -->
  <g stroke="#2f261d" stroke-width="4">
    <rect x="180" y="500" width="220" height="120" rx="10" fill="#6f4f33"/>
    <path d="M180 540h220" stroke="#3a2a1c" stroke-width="8"/>
    <rect x="430" y="470" width="150" height="150" fill="#b07a45"/>
    <path d="M505 470v150M430 545h150" stroke="#7c5733"/>
    <rect x="430" y="360" width="130" height="110" fill="#c08a52"/>
  </g>
  <!-- covered furniture (sheet) -->
  <path d="M640 620c0-120 50-170 140-170s140 50 140 170z" fill="#9a958c" stroke="#6f6a60" stroke-width="4"/>
  <path d="M660 560c40-20 200-20 240 0" stroke="#7d786e" stroke-width="4" fill="none"/>
  <!-- scattered -->
  <circle cx="600" cy="650" r="30" fill="#7a8e58" stroke="#3a2f23" stroke-width="4"/>
  <rect x="980" y="560" width="90" height="60" rx="8" fill="#8a5b4a" stroke="#3a2f23" stroke-width="4"/>
  <rect width="1200" height="900" fill="#17130e" opacity="0.2"/>
</svg>
